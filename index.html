<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;-webkit-tap-highlight-color:transparent;}

/* 強制横画面: 縦向きの時だけ90度回転 */
@media (orientation: portrait){
  body{
    transform-origin: top left;
    transform: rotate(90deg) translateY(-100%);

    height: 100vw;
  }
}

body{font-family:monospace;}
canvas{display:block;image-rendering:pixelated;position:fixed;top:0;left:0;}
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:5px 14px;background:rgba(0,0,0,0.88);color:#bbb;font-size:13px;z-index:10;}
#slots{position:fixed;top:30px;left:0;right:0;display:flex;justify-content:center;gap:8px;z-index:10;pointer-events:none;}
.slot{width:32px;height:32px;background:#111;border:2px solid #333;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:18px;}
#msg{position:fixed;bottom:150px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.93);color:#d4b896;padding:8px 14px;border:1px solid #4a3a2a;border-radius:3px;font-size:13px;text-align:center;max-width:300px;z-index:10;pointer-events:none;white-space:pre-line;display:none;line-height:1.7;}
#dpad{position:fixed;bottom:16px;left:16px;width:120px;height:120px;z-index:20;}
#dpad button{position:absolute;width:38px;height:38px;background:rgba(30,30,30,0.85);border:2px solid rgba(100,100,100,0.5);color:#aaa;font-size:18px;cursor:pointer;touch-action:none;border-radius:6px;user-select:none;}
#bu{top:0;left:41px;}#bd{bottom:0;left:41px;}#bl{top:41px;left:0;}#br{top:41px;right:0;}
#abtn{position:fixed;bottom:40px;right:20px;width:64px;height:64px;border-radius:50%;background:rgba(80,40,10,0.85);border:2px solid rgba(180,120,40,0.6);color:#dda;font-size:12px;cursor:pointer;z-index:20;touch-action:none;user-select:none;}
#roomLabel{position:fixed;top:4px;left:50%;transform:translateX(-50%);color:#666;font-size:11px;z-index:10;pointer-events:none;letter-spacing:2px;}
#fade{position:fixed;inset:0;background:#000;z-index:50;pointer-events:none;opacity:0;transition:opacity 0.35s;}
#flash{position:fixed;inset:0;background:rgba(0,0,180,0.55);z-index:49;pointer-events:none;opacity:0;transition:opacity 0.1s;}
#ov{position:fixed;inset:0;background:rgba(0,0,0,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:100;color:#fff;text-align:center;}
#ov h1{font-size:24px;color:#cc2222;text-shadow:0 0 30px #f00;letter-spacing:3px;}
#ov h2{font-size:20px;color:#55cc33;letter-spacing:2px;}
#ov p{font-size:13px;color:#999;line-height:1.9;max-width:320px;}

function tileAt(room,tx,ty){
  tx=Math.floor(tx);ty=Math.floor(ty);
  if(tx<0||ty<0||tx>=room.w||ty>=room.h)return W;
  return room.map[ty][tx];
}
function walkable(room,tx,ty){
  const t=tileAt(room,tx,ty);
  return t!==W&&t!==TB&&t!==TL;
}
function dst(ax,ay,bx,by){return Math.sqrt((ax-bx)**2+(ay-by)**2);}

// 入力
const INPUT={x:0,y:0};
const KEYS={};
window.addEventListener('keydown',e=>{
  KEYS[e.key]=true;
  if(e.key===' '||e.key==='Enter'){e.preventDefault();doAction();}
});
window.addEventListener('keyup',e=>{KEYS[e.key]=false;});
(function(){
  const dirs={bu:{x:0,y:-1},bd:{x:0,y:1},bl:{x:-1,y:0},br:{x:1,y:0}};
  Object.entries(dirs).forEach(([id,d])=>{
    const b=document.getElementById(id);
    b.addEventListener('pointerdown',e=>{e.preventDefault();b.setPointerCapture(e.pointerId);INPUT.x=d.x;INPUT.y=d.y;});
    b.addEventListener('pointerup',  e=>{e.preventDefault();INPUT.x=0;INPUT.y=0;});
    b.addEventListener('pointercancel',()=>{INPUT.x=0;INPUT.y=0;});
  });
})();
document.getElementById('abtn').addEventListener('pointerdown',e=>{e.preventDefault();doAction();});

// ゲーム状態
let G,frame=0,running=false,lastT=0,transitioning=false;
let ptx=6,pty=5,ptmr=0;

function init(){
  G={
    roomIdx:0,px:9,py:5,
    ex:-1,ey:-1,exActive:false,exMode:'patrol',
    exTimer:0,exWalk:0,alert:0,
    inv:[],roomItems:ROOMS.map((r,ri)=>JSON.parse(JSON.stringify(r.items))),
    hiding:false,over:false,clear:false,
    camX:0,camY:0,pdir:1,msgTimer:0,
  };
  spawnRoom(0,9,5,true);
  updHUD();setMsg('');
}

function spawnRoom(idx,px,py,instant){
  G.roomIdx=idx;G.px=px;G.py=py;
  const room=ROOMS[idx];
  if(room.enemyStart){
    G.ex=room.enemyStart.x;G.ey=room.enemyStart.y;
    G.exActive=true;G.exMode='patrol';G.alert=0;
  }else{
    G.exActive=false;G.ex=-1;G.ey=-1;
  }
  G.hiding=false;
  ptx=room.w/2;pty=room.h/2;ptmr=0;
  document.getElementById('roomLabel2').textContent=room.name;
  updateCamera(instant||false);
}

const PSPD=4.5;
function loop(ts){
  if(!running){requestAnimationFrame(loop);return;}
  const dt=Math.min((ts-lastT)/1000,0.05);
  lastT=ts;frame++;
  if(!transitioning){
    updateInput(dt);
    updateEnemy(dt);
    updateCamera(false);
    if(G.msgTimer>0){G.msgTimer--;if(G.msgTimer<=0)setMsg('');}
    updAlertHud();
  }
  draw();
  requestAnimationFrame(loop);
}

function updateInput(dt){
  if(G.hiding||G.over||G.clear)return;
  let ix=INPUT.x,iy=INPUT.y;
  if(ix===0&&iy===0){
    ix=(KEYS['ArrowRight']||KEYS['d']?1:0)-(KEYS['ArrowLeft']||KEYS['a']?1:0);
    iy=(KEYS['ArrowDown']||KEYS['s']?1:0)-(KEYS['ArrowUp']||KEYS['w']?1:0);
  }
  const dx=ix*PSPD*dt,dy=iy*PSPD*dt;
  if(dx!==0)G.pdir=dx>0?1:-1;
  const room=ROOMS[G.roomIdx],m=0.28;
  if(dx){const nx=G.px+dx,cx=dx>0?nx+m:nx-m;if(walkable(room,cx,G.py-m)&&walkable(room,cx,G.py+m))G.px=nx;}
  if(dy){const ny=G.py+dy,cy=dy>0?ny+m:ny-m;if(walkable(room,G.px-m,cy)&&walkable(room,G.px+m,cy))G.py=ny;}
}

function updateEnemy(dt){
  if(!G.exActive||G.over||G.clear)return;
  const room=ROOMS[G.roomIdx];
  const d=dst(G.px,G.py,G.ex,G.ey);
  const hasLight=!!G.inv.find(i=>i.id==='light');
  const sight=hasLight?7:4;

  if(!G.hiding&&d<sight) G.alert=Math.min(100,G.alert+(d<2?90:d<3?50:25)*dt);
  else G.alert=Math.max(0,G.alert-(G.hiding?50:20)*dt);

  if(G.exMode==='patrol'&&G.alert>45){
    G.exMode='sprint';G.exTimer=0.7;
    document.getElementById('flash').style.opacity='1';
    setTimeout(()=>document.getElementById('flash').style.opacity='0',300);
  }
  if(G.exMode==='sprint'){G.exTimer-=dt;if(G.exTimer<=0)G.exMode='chase';return;}
  if(G.exMode==='chase'&&G.alert<15)G.exMode='patrol';

  const spd=(G.exMode==='chase'?2.0:0.75)*dt;
  G.exWalk+=spd*8;

  if(G.exMode==='chase'){
    const edx=G.px-G.ex,edy=G.py-G.ey,ed=Math.max(dst(0,0,edx,edy),0.01);
    const nx=G.ex+edx/ed*spd,ny=G.ey+edy/ed*spd;
    if(walkable(room,nx,G.ey))G.ex=nx;
    if(walkable(room,G.ex,ny))G.ey=ny;
  }else{
    ptmr+=dt;
    if(ptmr>3||dst(G.ex,G.ey,ptx,pty)<0.5){
      ptmr=0;
      for(let i=0;i<30;i++){
        const rx=1+Math.floor(Math.random()*(room.w-2));
        const ry=1+Math.floor(Math.random()*(room.h-2));
        if(walkable(room,rx,ry)){ptx=rx+0.5;pty=ry+0.5;break;}
      }
    }
    const edx=ptx-G.ex,edy=pty-G.ey,ed=Math.max(dst(0,0,edx,edy),0.01);
    const nx=G.ex+edx/ed*spd,ny=G.ey+edy/ed*spd;
    if(walkable(room,nx,G.ey))G.ex=nx;
    if(walkable(room,G.ex,ny))G.ey=ny;
  }

  if(d<0.6&&!G.hiding&&!G.over){G.over=true;setTimeout(()=>showOv('over'),350);}
}

function updateCamera(instant){
  const cw=cv.width,ch=cv.height;
  const room=ROOMS[G.roomIdx];
  const mapW=room.w*T,mapH=room.h*T;
  const tx=G.px*T-cw/2,ty=G.py*T-ch/2;
  const cx=Math.max(0,Math.min(mapW-cw,tx));
  const cy=Math.max(0,Math.min(mapH-ch,ty));
  if(instant){G.camX=cx;G.camY=cy;}
  else{G.camX+=(cx-G.camX)*0.18;G.camY+=(cy-G.camY)*0.18;}
}

function doAction(){
  if(!G||G.over||G.clear||transitioning)return;
  if(G.hiding){G.hiding=false;setMsg('隠れ場所から出た。');return;}
  const room=ROOMS[G.roomIdx];
  const px=Math.floor(G.px),py=Math.floor(G.py);

  // 扉
  for(const door of room.doors){
    if(Math.abs(door.tx-G.px)<1.5&&Math.abs(door.ty-G.py)<1.5){
      if(door.toRoom===-1){
        const k=G.inv.filter(i=>i.id.startsWith('key')).length;
        if(k>=3){G.clear=true;showOv('clear');}
        else setMsg('鍵が足りない…\n('+k+'/3)');
      }else{
        changeRoom(door.toRoom,door.sx,door.sy);
      }
      return;
    }
  }

  // アイテム
  const ri=G.roomItems[G.roomIdx];
  for(let i=0;i<ri.length;i++){
    const it=ri[i];
    if(Math.abs(it.tx+0.5-G.px)<1.2&&Math.abs(it.ty+0.5-G.py)<1.2){
      if(G.inv.length<4){
        G.inv.push(it);ri.splice(i,1);updHUD();
        const msgs={
          diary:'日記帳を読んだ。\n「地下室の出口に3つの鍵が必要だ」',
          letter:'「あいつは光を嫌う。\n 懐中電灯を探せ」',
        };
        setMsg(msgs[it.id]||('「'+it.n+'」を手に入れた！'));
      }else setMsg('荷物がいっぱいだ…');
      return;
    }
  }

  // 隠れ場所
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    const t=tileAt(room,px+dx,py+dy);
    if(t===LK){G.hiding=true;setMsg('ロッカーに隠れた…\n息を殺して待つ…',999);return;}
    if(t===TL){G.hiding=true;setMsg('机の下に潜り込んだ…\n足音が近づいてくる…',999);return;}
  }

  setMsg('何もない…');
}

function changeRoom(to,sx,sy){
  transitioning=true;
  const fade=document.getElementById('fade');
  fade.style.opacity='1';
  setTimeout(()=>{
    spawnRoom(to,sx,sy,true);
    setTimeout(()=>{fade.style.opacity='0';transitioning=false;},380);
  },380);
}

function showOv(type){
  const ov=document.getElementById('ov');
  ov.innerHTML=type==='over'
    ?'<h1>捕まった…</h1><p>あいつに見つかってしまった。</p><button onclick="restart()">もう一度</button>'
    :'<h2>脱出成功！</h2><p>3つの鍵で扉を開け脱出した！</p><button onclick="restart()">もう一度</button>';
  ov.style.display='flex';
}
function restart(){init();document.getElementById('ov').style.display='none';}
function setMsg(t,d=180){
  const el=document.getElementById('msg');
  if(!t){el.style.display='none';return;}
  el.textContent=t;el.style.display='block';G.msgTimer=d;
}
function updHUD(){
  const k=G.inv.filter(i=>i.id.startsWith('key')).length;
  for(let i=0;i<3;i++){const s=document.getElementById('s'+i);if(s)s.textContent=G.inv[i]?G.inv[i].e:' ';}
}
function updAlertHud(){
  const al=Math.floor(G.alert);
  let txt='🗝️ '+G.inv.filter(i=>i.id.startsWith('key')).length+'/3';
  if(G.exMode==='sprint')txt='⚠ ！！！';
  else if(G.exMode==='chase')txt='⚠ 見つかった！';
  else if(al>25)txt='👁 気配を感じる…';
  document.getElementById('al').textContent=txt;
}

// リサイズ
function resize(){
  // CSS回転後の実際の描画サイズを使う
  const isPortrait = window.innerHeight > window.innerWidth;
  if(isPortrait){
    cv.width = window.innerHeight;
    cv.height = window.innerWidth;
  } else {
    cv.width = window.innerWidth;
    cv.height = window.innerHeight;
  }
}
window.addEventListener('resize',()=>{resize();if(G)updateCamera(true);});
resize();

// タイルキャッシュ
let TC=null;
function buildTC(){
  const oc=document.createElement('canvas');
  oc.width=T*9;oc.height=T;
  const c=oc.getContext('2d');

  // 床(0)
  c.fillStyle='#1e1b18';c.fillRect(0,0,T,T);
  c.fillStyle='#171411';c.fillRect(0,0,T,1);c.fillRect(0,0,1,T);
  c.fillStyle='#222018';c.fillRect(3,3,T/2-5,T/2-5);c.fillRect(T/2+2,T/2+2,T/2-5,T/2-5);
  c.fillStyle='#191714';c.fillRect(T/2+2,3,T/2-5,T/2-5);c.fillRect(3,T/2+2,T/2-5,T/2-5);

  // 壁(T)
  c.fillStyle='#111';c.fillRect(T,0,T,T);
  c.fillStyle='#1a1714';
  for(let y=0;y<T;y+=8)c.fillRect(T,y,T,1);
  for(let r=0;r<5;r++){const o=(r%2)*13;[0,13,26].forEach(x=>c.fillRect(T+o+x,r*8,1,8));}
  c.fillStyle='#201e1a';c.fillRect(T,0,T,2);

  // 扉(T*2)
  c.fillStyle='#1e1b18';c.fillRect(T*2,0,T,T);
  c.fillStyle='#3d2210';c.fillRect(T*2+4,0,T-8,T);
  c.fillStyle='#4e2c14';c.fillRect(T*2+6,2,T-12,T-2);
  c.fillStyle='#3a1e0c';c.fillRect(T*2+6,2,2,T-4);c.fillRect(T*2+T/2-1,2,2,T-4);c.fillRect(T*2+T-9,2,2,T-4);
  c.fillStyle='#c8a030';c.beginPath();c.arc(T*2+T-11,T/2,3,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(255,200,80,0.3)';c.fillRect(T*2+4,0,T-8,T);// 光沢

  // ロッカー(T*3)
  c.fillStyle='#1e1b18';c.fillRect(T*3,0,T,T);
  c.fillStyle='#1e2238';c.fillRect(T*3+3,0,T-6,T);
  c.fillStyle='#141828';c.fillRect(T*3+T/2-1,1,2,T-2);
  c.fillStyle='#282c4a';c.fillRect(T*3+3,0,T-6,5);
  c.fillStyle='#7a9cbd';c.fillRect(T*3+T/2-7,T/2-3,4,5);c.fillRect(T*3+T/2+3,T/2-3,4,5);
  c.fillStyle='#aaccee';c.fillRect(T*3+T/2-6,T/2-2,2,3);c.fillRect(T*3+T/2+4,T/2-2,2,3);

  // 出口(T*4)
  c.fillStyle='#081408';c.fillRect(T*4,0,T,T);
  c.fillStyle='#14461a';c.fillRect(T*4+5,1,T-10,T-1);
  c.fillStyle='#1a5c22';c.fillRect(T*4+7,3,T-14,T-4);
  c.fillStyle='#44ff66';c.font='bold 7px monospace';c.textAlign='center';
  c.fillText('EXIT',T*4+T/2,T/2+2);
  c.strokeStyle='rgba(80,255,100,0.6)';c.lineWidth=1;c.strokeRect(T*4+7,3,T-14,T-6);

  // テーブル/ベッド(T*5)
  c.fillStyle='#1e1b18';c.fillRect(T*5,0,T,T);
  c.fillStyle='#3a1e08';c.fillRect(T*5+2,2,T-4,T-4);
  c.fillStyle='#4a2a0e';c.fillRect(T*5+4,4,T-8,T-8);
  c.fillStyle='#5a3816';c.fillRect(T*5+6,6,T-12,T-12);

  // 本棚(T*6) - 使わないが念のため
  c.fillStyle='#1e1b18';c.fillRect(T*6,0,T,T);
  c.fillStyle='#2a1a08';c.fillRect(T*6+2,0,T-4,T);
  for(let i=0;i<5;i++){c.fillStyle=['#8B2020','#20528B','#1a6b1a','#8B6820','#5a1a8B'][i];c.fillRect(T*6+4+i*6,2,5,T-4);}

  TC=oc;
}

function getTX(t){
  if(t===W)return T;
  if(t===DR||t===DL||t===DU||t===DD)return T*2;
  if(t===LK)return T*3;
  if(t===EX)return T*4;
  if(t===TL||t===TB)return T*5;
  return 0;
}

function draw(){
  if(!TC)buildTC();
  const cw=cv.width,ch=cv.height;
  ctx.fillStyle='#000';ctx.fillRect(0,0,cw,ch);

  ctx.save();
  ctx.translate(-Math.round(G.camX),-Math.round(G.camY));

  const room=ROOMS[G.roomIdx];
  const hasLight=!!G.inv.find(i=>i.id==='light');
  const vr=999;
  const vr2=vr*vr;

  // タイル
  for(let ty=0;ty<room.h;ty++){
    for(let tx=0;tx<room.w;tx++){
      const ddx=tx+0.5-G.px,ddy=ty+0.5-G.py;
      if(ddx*ddx+ddy*ddy>(vr+1.5)*(vr+1.5))continue;
      const t=room.map[ty][tx];
      ctx.drawImage(TC,getTX(t),0,T,T,tx*T,ty*T,T,T);
      if(t===DR||t===DL||t===DU||t===DD){
        ctx.fillStyle='rgba(200,170,80,0.65)';
        ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('扉',tx*T+T/2,ty*T+T/2);
      }
      if(t===EX){
        ctx.fillStyle='rgba(80,255,100,0.5)';
        ctx.font='bold 8px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('出口',tx*T+T/2,ty*T+T/2+8);
      }
    }
  }

  // アイテム
  G.roomItems[G.roomIdx].forEach(it=>{
    const ddx=it.tx+0.5-G.px,ddy=it.ty+0.5-G.py;
    if(ddx*ddx+ddy*ddy>vr2)return;
    ctx.save();
    ctx.globalAlpha=0.75+Math.sin(frame*0.1)*0.25;
    ctx.font='22px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(it.e,(it.tx+0.5)*T,(it.ty+0.5)*T);
    ctx.restore();
  });

  drawEnemy();
  drawPlayer();
  ctx.restore();

  // 視野マスク(一時無効化)

  // アラート演出
  if(G.exMode==='chase'&&G.alert>50){
    const a=(G.alert-50)/50*0.22*(Math.sin(frame*0.3)*0.5+0.5);
    ctx.fillStyle='rgba(160,0,0,'+a+')';ctx.fillRect(0,0,cw,ch);
  }
  if(G.exMode==='sprint'){
    ctx.strokeStyle='rgba(60,60,255,0.6)';ctx.lineWidth=8;ctx.strokeRect(0,0,cw,ch);
  }
}

function drawPlayer(){
  const ppx=G.px*T,ppy=G.py*T;
  if(G.hiding){
    ctx.globalAlpha=0.3;
    ctx.fillStyle='#5566aa';ctx.fillRect(ppx-8,ppy-14,16,18);
    ctx.globalAlpha=1;return;
  }
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath();ctx.ellipse(ppx,ppy+12,10,3,0,0,Math.PI*2);ctx.fill();
  const lg=Math.sin(frame*0.32)*3;
  ctx.fillStyle='#3d4d5e';ctx.fillRect(ppx-7,ppy+1,6,11+lg);ctx.fillRect(ppx+1,ppy+1,6,11-lg);
  ctx.fillStyle='#1a1a1a';ctx.fillRect(ppx-8,ppy+10+lg,9,5);ctx.fillRect(ppx,ppy+10-lg,9,5);
  ctx.fillStyle='#5d7080';ctx.fillRect(ppx-10,ppy-15,20,18);
  ctx.fillStyle='#3d5060';ctx.fillRect(ppx-10,ppy-15,20,5);
  ctx.fillStyle='#778898';ctx.fillRect(ppx-2,ppy-10,4,7);
  ctx.fillStyle='#eebb99';ctx.fillRect(ppx-4,ppy-19,8,6);
  ctx.fillStyle='#ffcc99';ctx.fillRect(ppx-9,ppy-31,18,14);
  ctx.fillStyle='#332200';ctx.fillRect(ppx-9,ppy-31,18,5);ctx.fillRect(ppx-9,ppy-31,3,10);
  ctx.fillStyle='#111';ctx.fillRect(ppx+G.pdir*3-3,ppy-24,4,4);
  ctx.fillStyle='#eee';ctx.fillRect(ppx+G.pdir*3-2,ppy-23,2,2);
}

function drawEnemy(){
  if(!G.exActive)return;
  const d=dst(G.px,G.py,G.ex,G.ey);
  const hasLight=!!G.inv.find(i=>i.id==='light');
  const maxShow=hasLight?10:6.5;
  if(d>maxShow)return;
  const alpha=Math.min(1,(maxShow-d)/3);
  const epx=G.ex*T,epy=G.ey*T;
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(epx,epy);

  ctx.fillStyle='rgba(10,0,30,0.55)';
  ctx.beginPath();ctx.ellipse(0,16,14,5,0,0,Math.PI*2);ctx.fill();

  const lg=Math.sin(G.exWalk)*5;
  ctx.fillStyle='#1a2090';ctx.fillRect(-9,3,8,14+lg);ctx.fillRect(1,3,8,14-lg);
  ctx.fillStyle='#0a0a0a';ctx.fillRect(-10,14+lg,10,5);ctx.fillRect(0,14-lg,10,5);

  const isC=G.exMode==='chase';
  ctx.fillStyle=isC?'#2233dd':'#1a2090';ctx.fillRect(-13,-17,26,24);
  ctx.fillStyle=isC?'#3344ff':'#2230aa';ctx.fillRect(-13,-17,26,5);
  ctx.fillStyle='#101060';ctx.fillRect(-2,-11,4,9);

  const aw=Math.sin(G.exWalk)*4;
  ctx.fillStyle='#1a2090';ctx.fillRect(-20,-15,8,18+aw);ctx.fillRect(12,-15,8,18-aw);
  ctx.fillStyle='#101860';ctx.fillRect(-21,1+aw,11,6);ctx.fillRect(11,1-aw,11,6);

  ctx.fillStyle='#2244cc';ctx.fillRect(-13,-35,26,20);
  ctx.fillStyle='#3355dd';ctx.fillRect(-13,-35,26,4);
  ctx.fillStyle='#4466ff';
  ctx.beginPath();ctx.moveTo(-8,-34);ctx.lineTo(-12,-50);ctx.lineTo(-3,-34);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(8,-34);ctx.lineTo(12,-50);ctx.lineTo(3,-34);ctx.closePath();ctx.fill();
  ctx.fillStyle='#6688ff';
  ctx.beginPath();ctx.moveTo(-8,-34);ctx.lineTo(-10,-47);ctx.lineTo(-5,-34);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(8,-34);ctx.lineTo(10,-47);ctx.lineTo(5,-34);ctx.closePath();ctx.fill();

  const eg=0.7+Math.sin(frame*0.15)*0.3;
  ctx.fillStyle='#0a0a0a';ctx.fillRect(-11,-27,10,7);ctx.fillRect(1,-27,10,7);
  if(G.exMode==='sprint'){
    ctx.fillStyle='rgba(120,120,255,0.95)';
  }else{
    ctx.fillStyle='rgba(255,'+(isC?'0':'30')+',0,'+eg+')';
  }
  ctx.fillRect(-10,-26,8,5);ctx.fillRect(2,-26,8,5);
  ctx.fillStyle='rgba(255,80,0,'+eg+')';
  ctx.fillRect(-8,-25,4,3);ctx.fillRect(4,-25,4,3);

  if(isC){ctx.fillStyle='#050505';ctx.fillRect(-5,-19,10,5);}
  ctx.restore();
}

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('ov').style.display='none';
  init();running=true;lastT=performance.now();
  requestAnimationFrame(loop);
});
</script>
